<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Image Cards</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
  <style>
    .patner-card {
      position: relative;
      transition: transform 0.3s ease, background 0.3s ease;
      overflow: hidden;

    }

.our-clint{
  text-align: center;
  color: white;
  font-size: 35px;
  line-height: 1.2;
  font-weight: 700;
}
    .patner-card:hover {
      border: 1px solid#0056b3; 
      transform: translateY(-10px);
    }



    .patner-card img {
      width: 100%;
      height: 100%;
      mix-blend-mode: multiply;
      object-fit: center;
      border-radius: 10px;
    }


    .patner-card h3 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.5rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .patner-card:hover h3 {
      opacity: 1;
    }

    .patner-card {
      height: 200px; 
      padding: 20px;
    }

    .clint-left-section{
  -webkit-clip-path: polygon(0 0, 100% 0%, 75% 100%, 0% 100%);
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}



  </style>
</head>
<body>

  <div class="container">
    
    <div class="row justify-content-center">

      <div class="col-md-6">
        <div class="call-us-sec v2   clint-left-section">
          <p class="our-clint">Our Client</p>
        </div>
      </div>
      <div class="col-md-6">
        <div class="row justify-content-center">
        <div class=" col-md-4 mb-4">
          <div class="patner-card text-center shadow-sm card-hover">
            <img src="/img/team-img/indianOil.jpg" alt="Service Image">
          </div>
        </div>
        <div class="col-12  col-md-4 mb-4">
          <div class="patner-card text-center shadow-sm card-hover">
            <img src="/img/team-img/bhartPetroleum.png" alt="Service Image">
          </div>
        </div>
        <div class="col-md-4 mb-4">
          <div class="patner-card text-center shadow-sm card-hover">
            <img src="/img/team-img/download.png" alt="Service Image">
          
          </div>
        </div>
        </div>
      </div>
     
    </div>
  </div>
  
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
